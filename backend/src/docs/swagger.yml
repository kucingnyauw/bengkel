openapi: 3.0.3
info:
  title: Bengkel API
  description: API untuk manajemen bengkel (sparepart, service, shift, dan laporan)
  version: 1.0.0
  contact:
    name: Developer
    email: h3ykyy@gmail.com

servers:
  - url: http://localhost:3000/api/v1
    description: Development Server

tags:
  - name: Auth
    description: Otentikasi pengguna
  - name: Users
    description: Manajemen pengguna
  - name: Customers
    description: Manajemen pelanggan
  - name: Vehicles
    description: Manajemen kendaraan
  - name: Products
    description: Manajemen produk (sparepart & service)
  - name: Orders
    description: Manajemen pesanan
  - name: Payments
    description: Manajemen pembayaran
  - name: Expenses
    description: Manajemen pengeluaran
  - name: Shifts
    description: Manajemen shift kasir
  - name: Stock
    description: Manajemen stok sparepart
  - name: Tasks
    description: Penugasan mekanik
  - name: Reports
    description: Laporan
  - name: Notifications
    description: Manajemen notifikasi
  - name: Settings
    description: Pengaturan aplikasi
  - name: Health
    description: Pemeriksaan kesehatan sistem

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        error:
          type: string
      required: [success, message]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    UserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        fullName:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [ADMIN, CASHIER, MECHANIC]
        isActive:
          type: boolean
        isAuthenticated:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CustomerResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        phone:
          type: string
        createdAt:
          type: string
          format: date-time
        vehicles:
          type: array
          items:
            $ref: "#/components/schemas/VehicleSimple"
        orders:
          type: array
          items:
            $ref: "#/components/schemas/OrderSimple"
        _count:
          type: object
          properties:
            vehicles:
              type: integer
            orders:
              type: integer

    VehicleSimple:
      type: object
      properties:
        id:
          type: string
        plateNumber:
          type: string
        brand:
          type: string
        model:
          type: string

    VehicleResponse:
      type: object
      properties:
        id:
          type: string
        plateNumber:
          type: string
        brand:
          type: string
        model:
          type: string
        createdAt:
          type: string
          format: date-time
        customer:
          $ref: "#/components/schemas/CustomerSimple"
        orders:
          type: array
          items:
            $ref: "#/components/schemas/OrderSimple"
        _count:
          type: object
          properties:
            orders:
              type: integer

    CustomerSimple:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        phone:
          type: string

    ProductResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        sku:
          type: string
        type:
          type: string
          enum: [SPAREPART, SERVICE]
        description:
          type: string
        price:
          type: integer
        cost:
          type: integer
        stock:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        image:
          type: object
          nullable: true
          properties:
            id:
              type: string
            fileName:
              type: string
            path:
              type: string
        priceHistory:
          type: array
          items:
            $ref: "#/components/schemas/PriceHistory"

    PriceHistory:
      type: object
      properties:
        id:
          type: string
        price:
          type: integer
        cost:
          type: integer
        effectiveFrom:
          type: string
          format: date-time

    OrderResponse:
      type: object
      properties:
        id:
          type: string
        orderNumber:
          type: string
        status:
          type: string
          enum: [DRAFT, QUEUED, IN_PROGRESS, COMPLETED, CLOSED, CANCELLED]
        subtotal:
          type: integer
        tax:
          type: integer
        total:
          type: integer
        diagnosedAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        cashier:
          $ref: "#/components/schemas/UserSimple"
        customer:
          $ref: "#/components/schemas/CustomerSimple"
        vehicle:
          $ref: "#/components/schemas/VehicleSimple"
        payment:
          $ref: "#/components/schemas/PaymentSimple"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemResponse"
        histories:
          type: array
          items:
            $ref: "#/components/schemas/OrderHistoryResponse"

    OrderSimple:
      type: object
      properties:
        id:
          type: string
        orderNumber:
          type: string
        status:
          type: string
        total:
          type: integer
        createdAt:
          type: string
          format: date-time

    OrderItemResponse:
      type: object
      properties:
        id:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: integer
        subtotal:
          type: integer
        productNameSnapshot:
          type: string
        product:
          $ref: "#/components/schemas/ProductSimple"
        assignments:
          type: array
          items:
            $ref: "#/components/schemas/AssignmentSimple"

    OrderHistoryResponse:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        note:
          type: string
        createdAt:
          type: string
          format: date-time
        changedBy:
          $ref: "#/components/schemas/UserSimple"

    ProductSimple:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        sku:
          type: string
        type:
          type: string

    AssignmentSimple:
      type: object
      properties:
        id:
          type: string
        mechanicId:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        mechanic:
          $ref: "#/components/schemas/UserSimple"

    UserSimple:
      type: object
      properties:
        id:
          type: string
        fullName:
          type: string

    PaymentResponse:
      type: object
      properties:
        id:
          type: string
        method:
          type: string
          enum: [CASH, QRIS]
        amountPaid:
          type: integer
        change:
          type: integer
        status:
          type: string
          enum: [PENDING, PAID, REFUNDED]
        paidAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        order:
          $ref: "#/components/schemas/OrderSimple"

    PaymentSimple:
      type: object
      properties:
        id:
          type: string
        method:
          type: string
        amountPaid:
          type: integer
        status:
          type: string
        paidAt:
          type: string
          format: date-time

    ExpenseResponse:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        amount:
          type: integer
        category:
          type: string
          enum: [SUPPLIES, MAINTENANCE, UTILITIES, RENT, OTHER]
        date:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        shift:
          $ref: "#/components/schemas/ShiftSimple"
        recordedBy:
          $ref: "#/components/schemas/UserSimple"
        receipt:
          type: object
          nullable: true
          properties:
            id:
              type: string
            fileName:
              type: string
            path:
              type: string

    ShiftResponse:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [OPEN, CLOSED]
        startingCash:
          type: integer
        endingCash:
          type: integer
        expectedCash:
          type: integer
        cashSales:
          type: integer
        cashIn:
          type: integer
        cashOut:
          type: integer
        discrepancy:
          type: integer
        openedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time
        cashier:
          $ref: "#/components/schemas/UserSimple"
        orders:
          type: array
          items:
            $ref: "#/components/schemas/OrderSimple"
        expenses:
          type: array
          items:
            $ref: "#/components/schemas/ExpenseSimple"
        _count:
          type: object
          properties:
            orders:
              type: integer

    ShiftSimple:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        openedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time
        cashier:
          $ref: "#/components/schemas/UserSimple"

    ExpenseSimple:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        amount:
          type: integer
        category:
          type: string
        date:
          type: string
          format: date

    StockMovementResponse:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [IN, OUT, ADJUSTMENT]
        sourceType:
          type: string
          enum: [MANUAL, PURCHASE, SALE, RETURN, ADJUSTMENT]
        quantity:
          type: integer
        note:
          type: string
        createdAt:
          type: string
          format: date-time
        product:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            sku:
              type: string
            stock:
              type: integer
        recordedBy:
          $ref: "#/components/schemas/UserSimple"
        orderItem:
          type: object
          nullable: true
          properties:
            id:
              type: string
            productNameSnapshot:
              type: string
            order:
              $ref: "#/components/schemas/OrderSimple"

    TaskDetailResponse:
      type: object
      properties:
        id:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        mechanic:
          type: object
          properties:
            id:
              type: string
            fullName:
              type: string
            email:
              type: string
            phone:
              type: string
        orderItem:
          type: object
          properties:
            id:
              type: string
            quantity:
              type: integer
            unitPrice:
              type: integer
            subtotal:
              type: integer
            productNameSnapshot:
              type: string
            product:
              type: object
              properties:
                id:
                  type: string
                name:
                  type: string
                type:
                  type: string
                description:
                  type: string
                image:
                  type: object
                  nullable: true
            order:
              type: object
              properties:
                id:
                  type: string
                orderNumber:
                  type: string
                status:
                  type: string
                total:
                  type: integer
                createdAt:
                  type: string
                  format: date-time
                customer:
                  $ref: "#/components/schemas/CustomerSimple"
                vehicle:
                  $ref: "#/components/schemas/VehicleSimple"

    NotificationResponse:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        message:
          type: string
        type:
          type: string
          enum: [INFO, WARNING, SUCCESS, ERROR]
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time

    SettingResponse:
      type: object
      properties:
        id:
          type: string
        key:
          type: string
        value:
          type: string
        updatedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: "ok"
        timestamp:
          type: string
          format: date-time
        uptime:
          type: number
        services:
          type: object
          properties:
            database:
              type: string
            redis:
              type: string
            supabase:
              type: string

    DashboardResponse:
      type: object
      properties:
        today:
          type: object
          properties:
            date:
              type: string
            orders:
              type: integer
            revenue:
              type: integer
            averageOrderValue:
              type: number
        thisMonth:
          type: object
          properties:
            orders:
              type: integer
            revenue:
              type: integer
        pending:
          type: object
          properties:
            orders:
              type: integer
        activeShift:
          type: object
          nullable: true
          properties:
            id:
              type: string
            cashier:
              type: string
            openedAt:
              type: string
              format: date-time
            startingCash:
              type: integer
            currentCashSales:
              type: integer
            orderCount:
              type: integer
        inventory:
          type: object
          properties:
            totalProducts:
              type: integer
            activeProducts:
              type: integer
            lowStockCount:
              type: integer
            totalStockValue:
              type: integer
            lowStockProducts:
              type: array
              items:
                type: object

    SalesReportResponse:
      type: object
      properties:
        period:
          type: object
          properties:
            startDate:
              type: string
              nullable: true
            endDate:
              type: string
              nullable: true
        summary:
          type: object
          properties:
            totalOrders:
              type: integer
            totalSales:
              type: integer
            totalSubtotal:
              type: integer
            totalTax:
              type: integer
        dailyBreakdown:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              orderCount:
                type: integer
              totalSales:
                type: integer
              averageOrderValue:
                type: number

    ProfitLossResponse:
      type: object
      properties:
        period:
          type: object
          properties:
            startDate:
              type: string
              nullable: true
            endDate:
              type: string
              nullable: true
        grossRevenue:
          type: integer
        totalCogs:
          type: integer
        grossProfit:
          type: integer
        grossMargin:
          type: number
        totalOperatingExpenses:
          type: integer
        netProfit:
          type: integer
        netMargin:
          type: number

security:
  - BearerAuth: []

paths:
  # ==================== HEALTH ====================
  /health:
    get:
      tags: [Health]
      summary: Periksa kesehatan sistem
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ==================== AUTH ====================
  /auth/validate/email:
    post:
      tags: [Auth]
      summary: Validasi email & kirim magic link
      description: Cek apakah email terdaftar, jika ya kirim magic link
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
      responses:
        "200":
          description: Magic link terkirim
        "400":
          description: Bad Request

  # ==================== USERS ====================
  /users:
    post:
      tags: [Users]
      summary: Buat user baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, fullName]
              properties:
                email:
                  type: string
                  format: email
                fullName:
                  type: string
                phone:
                  type: string
                role:
                  type: string
                  enum: [ADMIN, CASHIER, MECHANIC]
                  default: CASHIER
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
        "409":
          description: Conflict
    get:
      tags: [Users]
      summary: Daftar user
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: role
          schema:
            type: string
            enum: [ADMIN, CASHIER, MECHANIC]
        - in: query
          name: isActive
          schema:
            type: boolean
      responses:
        "200":
          description: OK

  /users/me:
    get:
      tags: [Users]
      summary: Profil pengguna yang sedang login
      responses:
        "200":
          description: OK

  /users/employees:
    get:
      tags: [Users]
      summary: Daftar karyawan (kasir & mekanik)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: role
          schema:
            type: string
            enum: [CASHIER, MECHANIC]
        - in: query
          name: isActive
          schema:
            type: boolean
      responses:
        "200":
          description: OK

  /users/admins:
    get:
      tags: [Users]
      summary: Daftar admin
      responses:
        "200":
          description: OK

  /users/check/email:
    get:
      tags: [Users]
      summary: Cek ketersediaan email
      parameters:
        - in: query
          name: email
          required: true
          schema:
            type: string
            format: email
        - in: query
          name: excludeId
          schema:
            type: string
      responses:
        "200":
          description: OK

  /users/check/phone:
    get:
      tags: [Users]
      summary: Cek ketersediaan nomor telepon
      parameters:
        - in: query
          name: phone
          required: true
          schema:
            type: string
        - in: query
          name: excludeId
          schema:
            type: string
      responses:
        "200":
          description: OK

  /users/role/{role}:
    get:
      tags: [Users]
      summary: Daftar user berdasarkan role
      parameters:
        - in: path
          name: role
          required: true
          schema:
            type: string
            enum: [ADMIN, CASHIER, MECHANIC]
      responses:
        "200":
          description: OK

  /users/email/{email}:
    get:
      tags: [Users]
      summary: Cari user berdasarkan email
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not Found

  /users/phone/{phone}:
    get:
      tags: [Users]
      summary: Cari user berdasarkan nomor telepon
      parameters:
        - in: path
          name: phone
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not Found

  /users/{id}:
    get:
      tags: [Users]
      summary: Detail user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
    put:
      tags: [Users]
      summary: Update user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                fullName:
                  type: string
                phone:
                  type: string
                role:
                  type: string
                  enum: [ADMIN, CASHIER, MECHANIC]
                isActive:
                  type: boolean
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
    delete:
      tags: [Users]
      summary: Hapus user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not Found

  /users/{id}/resend-magic-link:
    post:
      tags: [Users]
      summary: Kirim ulang magic link
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not Found

  # ==================== CUSTOMERS ====================
  /customers:
    post:
      tags: [Customers]
      summary: Buat pelanggan baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                phone:
                  type: string
      responses:
        "201":
          description: Created
        "409":
          description: Conflict
    get:
      tags: [Customers]
      summary: Daftar pelanggan
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: OK

  /customers/upsert:
    put:
      tags: [Customers]
      summary: Buat atau update pelanggan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, phone]
              properties:
                name:
                  type: string
                phone:
                  type: string
      responses:
        "200":
          description: OK

  /customers/phone/check:
    get:
      tags: [Customers]
      summary: Cek ketersediaan nomor telepon
      parameters:
        - in: query
          name: phone
          required: true
          schema:
            type: string
        - in: query
          name: excludeId
          schema:
            type: string
      responses:
        "200":
          description: OK

  /customers/phone/{phone}:
    get:
      tags: [Customers]
      summary: Cari pelanggan berdasarkan nomor telepon
      parameters:
        - in: path
          name: phone
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not Found

  /customers/{id}:
    get:
      tags: [Customers]
      summary: Detail pelanggan
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
    put:
      tags: [Customers]
      summary: Update pelanggan
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name:
                  type: string
                phone:
                  type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
    delete:
      tags: [Customers]
